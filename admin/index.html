  <title>Admin — CasinoInsider</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
  <link rel="icon" type="image/svg+xml" href="/casino-insider/assets/img/favicon.svg">
</head>
<body class="admin-body">

  <div class="login-card">
    <div class="login-header">
      <span class="login-logo">Casino<span>Insider</span> MY</span>
      <p class="login-subtitle">Admin</p>
    </div>

    <form class="login-form" id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>

      <div class="form-error" id="formError" hidden></div>

      <button type="submit" class="login-btn" id="submitBtn">Sign in</button>
    </form>
  </div>

  <script type="module">
    import { getSession, login } from '../assets/js/auth.js';

    // Redirect immediately if already authenticated
    const session = await getSession();
    if (session) window.location.replace('dashboard.html');

    const form    = document.getElementById('loginForm');
    const errorEl = document.getElementById('formError');
    const btn     = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.hidden = true;
      btn.disabled   = true;
      btn.textContent = 'Signing in…';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { error } = await login(email, password);

      if (error) {
        errorEl.textContent = error.message ?? 'Login failed. Please try again.';
        errorEl.hidden      = false;
        btn.disabled        = false;
        btn.textContent     = 'Sign in';
        return;
      }

      window.location.replace('dashboard.html');
    });
  </script>

</body>
</html>
